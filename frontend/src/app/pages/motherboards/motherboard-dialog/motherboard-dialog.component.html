<h2 mat-dialog-title>
  {{ data ? 'Edit Motherboard' : 'Add Motherboard' }}
</h2>
<div mat-dialog-content>
  <form [formGroup]="motherboardForm">
    <mat-form-field appearance="outline">
      <mat-label>Pinceles y témperas	</mat-label>
      <input matInput formControlName="name" required />
      <mat-error *ngIf="motherboardForm.get('name')?.hasError('required')">campo requiredo</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Carpetas y portafolios	</mat-label>
      <input matInput formControlName="brand" required />
      <mat-error *ngIf="motherboardForm.get('brand')?.hasError('required')">campo requiredo</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Engrapadoras y perforadoras	</mat-label>
      <input matInput formControlName="socketType" required />
      <mat-error *ngIf="motherboardForm.get('socketType')?.hasError('required')">campo requiredo</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Calculadoras (básicas y científicas)</mat-label>
      <input matInput formControlName="formFactor" required />
      <mat-error *ngIf="motherboardForm.get('formFactor')?.hasError('required')">campo requiredo</mat-error>
    </mat-form-field>
  </form>
</div>

<div mat-dialog-actions>
  <button mat-button color="warn" (click)="onCancel()">Cancelar</button>
  <button mat-button color="primary" (click)="onSubmit()" [disabled]="!motherboardForm.valid">Guardar</button>
</div>
