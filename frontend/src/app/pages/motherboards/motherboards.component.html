<div class="container">
  <h1>Utiles</h1>
  <button mat-raised-button color="primary" (click)="openDialog()">agregar Utiles</button>

  <table mat-table [dataSource]="motherboards" class="mat-elevation-z8">
    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>Cuadernos</th>
      <td mat-cell *matCellDef="let element">{{ element.id }}</td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Pinceles y témperas</th>
      <td mat-cell *matCellDef="let element">{{ element.name }}</td>
    </ng-container>

    <!-- Brand Column -->
    <ng-container matColumnDef="brand">
      <th mat-header-cell *matHeaderCellDef>Carpetas y portafolios</th>
      <td mat-cell *matCellDef="let element">{{ element.brand }}</td>
    </ng-container>

    <!-- Socket Type Column -->
    <ng-container matColumnDef="socketType">
      <th mat-header-cell *matHeaderCellDef>Engrapadoras y perforadoras</th>
      <td mat-cell *matCellDef="let element">{{ element.socketType }}</td>
    </ng-container>

    <!-- Form Factor Column -->
    <ng-container matColumnDef="formFactor">
      <th mat-header-cell *matHeaderCellDef>Calculadoras (básicas y científicas)</th>
      <td mat-cell *matCellDef="let element">{{ element.formFactor }}</td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Pegamento en barra o líquido</th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="accent" (click)="openDialog(element)">
          <mat-icon>editar</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteMotherboard(element._id)">
          <mat-icon>eliminar</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
