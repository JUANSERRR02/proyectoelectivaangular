<div class="container">
  <h1>Juguetes</h1>
  <button mat-raised-button color="primary" (click)="openDialog()">añadir juguete</button>

  <table mat-table [dataSource]="psus" class="mat-elevation-z8">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Marca de empresa</th>
      <td mat-cell *matCellDef="let element">{{ element.name }}</td>
    </ng-container>

    <ng-container matColumnDef="wattage">
      <th mat-header-cell *matHeaderCellDef>Cantidad</th>
      <td mat-cell *matCellDef="let element">{{ element.wattage }}</td>
    </ng-container>

    <ng-container matColumnDef="efficiencyRating">
      <th mat-header-cell *matHeaderCellDef>Grande o pequeño</th>
      <td mat-cell *matCellDef="let element">{{ element.efficiencyRating }}</td>
    </ng-container>

    <ng-container matColumnDef="modular">
      <th mat-header-cell *matHeaderCellDef>Caja</th>
      <td mat-cell *matCellDef="let element">{{ element.modular ? 'Yes' : 'No' }}</td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef>Precio ($)</th>
      <td mat-cell *matCellDef="let element">{{ element.price }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="accent" (click)="openDialog(element)">
          <mat-icon>editar</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deletePsu(element._id)">
          <mat-icon>Eliminar</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
