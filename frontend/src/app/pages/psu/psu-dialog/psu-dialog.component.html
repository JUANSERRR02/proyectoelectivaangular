<h2 mat-dialog-title>{{ isEditMode ? 'Editar juguete' : 'añadir juguete' }}</h2>
<div mat-dialog-content>
  <form [formGroup]="psuForm">
    <mat-form-field appearance="outline">
      <mat-label>Marca</mat-label>
      <input matInput formControlName="name" required />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>tipo de juguete</mat-label>
      <input matInput type="number" formControlName="wattage" required />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>tamaño</mat-label>
      <input matInput formControlName="efficiencyRating" />
    </mat-form-field>

    <mat-checkbox formControlName="modular">Caja</mat-checkbox>

  </form>
</div>
<div mat-dialog-actions>
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button mat-raised-button color="primary" [disabled]="psuForm.invalid" (click)="onSubmit()">Guardar </button>
</div>
